<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Опросы сотрудников</title>
    <meta name="description" content="Вход в систему опросов сотрудников">
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    {{if .DevMode}}
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <script src="/static/js/app.js"></script>
    <script src="/static/js/login.js"></script>
    {{else}}
    <link rel="stylesheet" href="/static/css/base.min.css">
    <link rel="stylesheet" href="/static/css/components.min.css">
    <script src="/static/js/app.min.js"></script>
    <script src="/static/js/login.min.js"></script>
    {{end}}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="login-page">
    <header>
        <nav>
            <div class="nav-container">
                <div class="nav-logo">Опросы сотрудников</div>
            </div>
        </nav>
    </header>
    
    <main>
        <div class="container login-wrapper">
            <div class="login-container">
                <div class="login-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                        <polyline points="14 2 14 8 20 8"></polyline>
                        <line x1="16" y1="13" x2="8" y2="13"></line>
                        <line x1="16" y1="17" x2="8" y2="17"></line>
                        <polyline points="10 9 9 9 8 9"></polyline>
                    </svg>
                </div>
                <h2 class="login-title">Добро пожаловать</h2>
                <p class="login-subtitle">Выберите профиль для входа в систему</p>
                
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <span>Загрузка пользователей...</span>
                </div>
                
                <div id="error-message" class="message message-error hidden">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                    <span>Ошибка загрузки пользователей</span>
                </div>

                <div id="users-container" class="users-grid hidden">
                    <!-- Users will be loaded here -->
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Система внутренних опросов. Все права защищены.</p>
        </div>
    </footer>

</body>
</html>
