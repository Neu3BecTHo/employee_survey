<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опрос уже пройден - Опросы сотрудников</title>
    <meta name="description" content="Вы уже прошли этот опрос">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    {{if .DevMode}}
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <script src="/static/js/app.js"></script>
    {{else}}
    <link rel="stylesheet" href="/static/css/base.min.css">
    <link rel="stylesheet" href="/static/css/components.min.css">
    <script src="/static/js/app.min.js"></script>
    {{end}}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <div class="nav-logo">Опросы сотрудников</div>
                <div class="nav-user">
                    <div class="user-info">
                        <span id="current-user">Загрузка...</span>
                        <span id="user-role" class="role-text">Загрузка...</span>
                    </div>
                    <button id="logout-btn" class="btn btn-secondary">Выйти</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="container already-responded-wrapper">
            <div class="card already-responded-card">
                <div class="already-responded-icon">
                    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--success-500)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                        <polyline points="22 4 12 14.01 9 11.01"></polyline>
                    </svg>
                </div>
                <h2 class="already-responded-title">Опрос уже пройден</h2>
                <p class="already-responded-text">
                    Спасибо за ваше участие. Вы можете посмотреть свои ответы в разделе "Мои ответы".
                </p>
                <div class="already-responded-actions">
                    <a href="/surveys/my" class="btn btn-primary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                            <polyline points="14 2 14 8 20 8"></polyline>
                            <line x1="16" y1="13" x2="8" y2="13"></line>
                            <line x1="16" y1="17" x2="8" y2="17"></line>
                            <polyline points="10 9 9 9 8 9"></polyline>
                        </svg>
                        Мои ответы
                    </a>
                    <a href="/" class="btn btn-secondary">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"></line>
                            <polyline points="12 19 5 12 12 5"></polyline>
                        </svg>
                        Назад к опросам
                    </a>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Система внутренних опросов. Все права защищены.</p>
        </div>
    </footer>

    <script>
        // Initialize app to show user info
        document.addEventListener('DOMContentLoaded', () => {
            if (window.app) {
                window.app.loadCurrentUser();
            }
        });
    </script>
</body>
</html>
