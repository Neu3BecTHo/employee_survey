<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты опроса - Опросы сотрудников</title>
    <meta name="description" content="Результаты опроса сотрудников">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/static/css/base.css">
    <link rel="stylesheet" href="/static/css/results.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <div class="nav-logo">Опросы сотрудников</div>
                <div class="nav-user">
                    <div class="user-info">
                        <span id="current-user">Загрузка...</span>
                        <span id="user-role" class="role-text">Загрузка...</span>
                    </div>
                    <button id="logout-btn" class="btn btn-secondary">Выйти</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <h1>Результаты опроса</h1>
        <div id="loading" class="loading">
            Загрузка результатов...
        </div>
        
        <div id="error-message" class="error-message" style="display: none;">
            Ошибка загрузки результатов.
        </div>

        <div id="results-container" style="display: none;">
            <div class="container">
                <div class="section-header">
                    <h2 id="survey-title">Загрузка...</h2>
                    <div class="survey-meta">
                        <span id="total-responses" class="survey-status"></span>
                    </div>
                </div>
                
                <p id="survey-description" class="survey-description">Загрузка...</p>
                
                <div class="results-section">
                    <h3>📊 Результаты по вопросам</h3>
                    <div id="questions-results">
                        <!-- Question results will be loaded here -->
                    </div>
                </div>

                <div class="form-actions">
                    <button onclick="window.location.href='/'" class="btn btn-secondary">
                        ← Назад к опросам
                    </button>
                    <button onclick="window.location.href='/surveys/my'" class="btn btn-primary">
                        📋 Мои ответы
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2026 Система внутренних опросов. Все права защищены.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/survey-results.js"></script>
</body>
</html>
