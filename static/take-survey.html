<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прохождение опроса</title>
    <meta name="description" content="Прохождение внутреннего опроса сотрудников">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <h1>Опросы сотрудников</h1>
                <div class="nav-user">
                    <span id="current-user">Загрузка...</span>
                    <button id="logout-btn" class="btn-secondary">Выйти</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div id="loading" class="loading">
            Загрузка опроса...
        </div>

        <div id="error-message" class="error-message" style="display: none;">
            Ошибка загрузки опроса.
        </div>

        <div id="survey-container" style="display: none;">
            <div class="survey-form">
                <h1 id="survey-title">Загрузка...</h1>
                <p id="survey-description" class="survey-description">Загрузка...</p>

                <form id="survey-form">
                    <div id="questions-container">
                        <!-- Questions will be loaded here -->
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submit-btn">Отправить ответы</button>
                    </div>
                </form>

                <div id="success-message" class="success-message" style="display: none;">
                    ✅ Спасибо! Ваши ответы успешно отправлены.
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2024 Система внутренних опросов. Все права защищены.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/take-survey.js"></script>
</body>
</html>
