<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Результаты опроса</title>
    <meta name="description" content="Результаты внутреннего опроса сотрудников">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <h1>Опросы сотрудников</h1>
                <div class="nav-user">
                    <span id="current-user">Загрузка...</span>
                    <button id="logout-btn" class="btn-secondary">Выйти</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div id="loading" class="loading">
            Загрузка результатов...
        </div>

        <div id="error-message" class="error-message" style="display: none;">
            Ошибка загрузки результатов.
        </div>

        <div id="results-container" class="results-container" style="display: none;">
            <div class="results-header">
                <h1 id="survey-title">Загрузка...</h1>
                <p id="survey-description">Загрузка...</p>
            </div>

            <div class="results-stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-responses">0</div>
                    <div class="stat-label">Всего ответов</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="survey-status">Закрыт</div>
                    <div class="stat-label">Статус опроса</div>
                </div>
            </div>

            <div id="questions-results">
                <!-- Question results will be loaded here -->
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2024 Система внутренних опросов. Все права защищены.</p>
        </div>
    </footer>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/survey-results.js"></script>
</body>
</html>
