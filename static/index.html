<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Опросы сотрудников</title>
    <meta name="description" content="Система внутренних опросов сотрудников">
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <h1>Опросы сотрудников</h1>
                <div class="nav-user">
                    <span id="current-user">Загрузка...</span>
                    <button id="logout-btn" class="btn-secondary">Выйти</button>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <section class="surveys-section">
            <div class="container">
                <div class="section-header">
                    <h1>Доступные опросы</h1>
                    <div id="admin-controls" style="display: none;">
                        <button id="create-survey-btn" class="btn-primary">Создать опрос</button>
                    </div>
                </div>

                <div id="loading" class="loading">
                    Загрузка опросов...
                </div>

                <div id="error-message" class="error-message" style="display: none;">
                    Ошибка загрузки опросов. Попробуйте обновить страницу.
                </div>

                <div id="empty-state" class="empty-state" style="display: none;">
                    <h2>Опросов пока нет</h2>
                    <p>Администратор скоро создаст новые опросы.</p>
                </div>

                <div id="surveys-list" class="surveys-list" style="display: none;">
                    <!-- Surveys will be loaded here -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <p>&copy; 2024 Система внутренних опросов. Все права защищены.</p>
        </div>
    </footer>

    <!-- Modals -->
    <div id="create-survey-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Создать опрос</h2>
                <button class="modal-close">&times;</button>
            </div>
            <form id="create-survey-form" class="modal-form">
                <div class="form-group">
                    <label for="survey-title">Название опроса</label>
                    <input type="text" id="survey-title" name="title" required>
                </div>
                <div class="form-group">
                    <label for="survey-description">Описание</label>
                    <textarea id="survey-description" name="description" rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary modal-cancel">Отмена</button>
                    <button type="submit" class="btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/app.js"></script>
    <script src="/static/js/surveys.js"></script>
</body>
</html>
