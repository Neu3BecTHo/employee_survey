services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: survey_app
      POSTGRES_USER: survey_user
      POSTGRES_PASSWORD: survey_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/migrations
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U survey_user -d survey_app"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    build: .
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_USER: survey_user
      DB_PASSWORD: survey_pass
      DB_NAME: survey_app
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
